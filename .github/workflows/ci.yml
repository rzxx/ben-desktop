name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.11"
          cache: true
          cache-dependency-path: |
            go.sum
            relayd/go.sum

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install Go vulnerability scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Test desktop module
        run: go test ./...

      - name: Test relay module
        working-directory: relayd
        run: go test ./...

      - name: Test shared registry authentication module
        working-directory: shared/registryauth
        run: go test ./...

      - name: Audit Go dependencies
        run: |
          govulncheck ./...
          (cd relayd && govulncheck ./...)
          (cd shared/registryauth && govulncheck ./...)

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend
        run: bun audit

      - name: Check frontend
        working-directory: frontend
        run: |
          bun run format:check
          bun lint
          bun typecheck
          bun run test:run
