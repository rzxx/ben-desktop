name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  GO_VERSION: "1.25.7"
  WAILS_VERSION: "v3.0.0-alpha.98-tui"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            curl
            pkgconf
            nasm
            yasm
            meson
            ninja
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-aom
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-libplacebo
            mingw-w64-x86_64-libass

      - name: Install Wails CLI and NSIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}"
          choco install nsis -y
          # Chocolatey installs NSIS but does not add it to PATH for the current
          # session. The Wails NSIS task invokes makensis, so discover the
          # install directory from the registry and fall back to common paths.
          $nsisDir = $null
          $regPaths = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
          )
          foreach ($regPath in $regPaths) {
            $entry = Get-ItemProperty $regPath -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like 'Nullsoft*' -or $_.DisplayName -eq 'NSIS' } |
              Select-Object -First 1
            if ($entry -and $entry.InstallLocation) {
              $nsisDir = $entry.InstallLocation
              break
            }
          }
          if (-not $nsisDir) {
            foreach ($candidate in @(
              'C:\Program Files (x86)\NSIS',
              'C:\Program Files\NSIS',
              'C:\ProgramData\chocolatey\lib\nsis\tools\NSIS'
            )) {
              if (Test-Path (Join-Path $candidate 'makensis.exe')) {
                $nsisDir = $candidate
                break
              }
            }
          }
          if (-not $nsisDir) {
            throw 'Could not find NSIS installation directory'
          }
          echo $nsisDir >> $env:GITHUB_PATH
          $env:PATH = "$nsisDir;$env:PATH"
          # Pre-install frontend dependencies so the build task does not run
          # bun install concurrently with go mod tidy, which can race on Windows.
          # --frozen-lockfile keeps releases reproducible.
          Push-Location "$env:GITHUB_WORKSPACE\frontend"
          bun install --frozen-lockfile
          Pop-Location

      - name: Set build metadata
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart("v")
          $commit = git -C $env:GITHUB_WORKSPACE rev-parse HEAD
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "BUILD_COMMIT=$commit" >> $env:GITHUB_ENV
          "BUILD_TIME=$((Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ"))" >> $env:GITHUB_ENV

      - name: Build Windows media runtime
        shell: msys2 {0}
        run: bash ./build/deps/windows/build-media-runtime.mingw64.sh

      - name: Build Windows executable and installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CGO_ENABLED = '0'
          wails3 task windows:build ARCH=amd64 CGO_ENABLED=0 APP_VERSION=${env:APP_VERSION} BUILD_COMMIT=${env:BUILD_COMMIT} BUILD_TIME=${env:BUILD_TIME}
          wails3 task windows:create:nsis:installer ARCH=amd64 CGO_ENABLED=0 APP_VERSION=${env:APP_VERSION} BUILD_COMMIT=${env:BUILD_COMMIT} BUILD_TIME=${env:BUILD_TIME}
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/ben-desktop.exe dist/ben-desktop-windows-amd64-app-update.exe
          $installer = "bin/ben-desktop-amd64-installer.exe"
          if (Test-Path $installer) {
            Copy-Item $installer dist/ben-desktop-windows-amd64-setup.exe
          }
          $portableDir = "dist/ben-desktop-windows-amd64-portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Get-ChildItem -Path "bin" -Force |
            Where-Object { $_.Name -notlike "*-installer.exe" -and $_.Name -notlike "*.msix" } |
            Copy-Item -Destination $portableDir -Recurse -Force
          Compress-Archive -Path $portableDir -DestinationPath "dist/ben-desktop-windows-amd64-portable.zip" -Force
          Remove-Item -LiteralPath $portableDir -Recurse -Force
          go run ./cmd/benreleasetool runtime-bundle --source build/windows/runtime --version-file build/windows/runtime/version.txt --out-dir dist --require
          Copy-Item build/windows/runtime/licenses/media-runtime-source-record.json dist/ben-desktop-media-runtime-source-record-windows-amd64.json
          Copy-Item build/windows/runtime/licenses/ffmpeg-local-changes.diff dist/ben-desktop-ffmpeg-local-changes.diff
          Copy-Item build/windows/runtime/licenses/mpv-local-changes.diff dist/ben-desktop-mpv-local-changes.diff
          Copy-Item build/deps/.work/windows/ffmpeg-*.tar.xz dist/
          Copy-Item build/deps/.work/windows/mpv-v*.tar.gz dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: dist/*

  build-macos:
    name: macOS
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install Wails CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unused Xcode versions, keeping only the currently selected one.
          current_xcode_app="$(xcode-select -p 2>/dev/null | cut -d/ -f3)"
          for xcode in /Applications/Xcode_*.app; do
            if [ -e "$xcode" ] && [ "$(basename "$xcode")" != "$current_xcode_app" ]; then
              echo "Removing $xcode"
              sudo rm -rf "$xcode"
            fi
          done
          # Remove large SDKs and toolchains not needed for this build.
          sudo rm -rf /Users/runner/Library/Android/sdk
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/dotnet
          echo "Disk space after cleanup:"
          df -h

      - name: Set build metadata
        run: |
          VERSION="${RELEASE_TAG#v}"
          COMMIT="$(git rev-parse HEAD)"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${COMMIT}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build universal app bundle
        run: |
          wails3 task darwin:package:universal APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv
          mkdir -p dist
          ditto -c -k --keepParent bin/ben-desktop.app dist/ben-desktop-darwin-universal.zip
          # Explicitly size the DMG image because hdiutil can underestimate the
          # space required when copying the .app bundle, leading to "No space
          # left on device" errors inside the mounted volume.
          app_size_kb=$(du -sk bin/ben-desktop.app | awk '{print $1}')
          image_size_mb=$((app_size_kb / 1024 + 512))
          hdiutil create -volname "ben-desktop" -srcfolder bin/ben-desktop.app -ov -format UDZO -size "${image_size_mb}m" dist/ben-desktop-darwin-universal.dmg

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: dist/*

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install system dependencies and Wails CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Set build metadata
        run: |
          VERSION="${RELEASE_TAG#v}"
          COMMIT="$(git rev-parse HEAD)"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${COMMIT}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build Linux binary and AppImage
        run: |
          wails3 task linux:build ARCH=amd64 APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv OUTPUT=bin/ben-desktop-linux-amd64
          mkdir -p dist
          cp bin/ben-desktop-linux-amd64 dist/ben-desktop-linux-amd64
          wails3 task linux:create:appimage ARCH=amd64 APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv OUTPUT=bin/ben-desktop
          cp bin/*.AppImage dist/ || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux
          path: dist/*

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      UPDATER_PRIVATE_KEY_PEM: ${{ secrets.UPDATER_PRIVATE_KEY_PEM }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Sign release assets
        run: |
          test -n "${UPDATER_PRIVATE_KEY_PEM}"
          mapfile -t ASSETS < <(find dist -maxdepth 1 -type f ! -empty ! -name '*.sig' ! -name 'SHA256SUMS' -printf '%p\n' | sort)
          go run ./cmd/benreleasetool sign --sums dist/SHA256SUMS "${ASSETS[@]}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t RELEASE_ASSETS < <(find dist -maxdepth 1 -type f ! -empty -printf '%p\n' | sort)
          gh release create "${RELEASE_TAG}" "${RELEASE_ASSETS[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "ben-desktop ${RELEASE_TAG}" \
            --generate-notes
