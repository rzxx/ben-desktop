name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.25.7"
  WAILS_VERSION: "v3.0.0-alpha.98-tui"

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            curl
            pkgconf
            nasm
            yasm
            meson
            ninja
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-ntldd
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-aom
            mingw-w64-x86_64-zlib

      - name: Install Wails CLI and NSIS
        shell: pwsh
        run: |
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${env:WAILS_VERSION}"
          choco install nsis -y

      - name: Set build metadata
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart("v")
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "BUILD_COMMIT=${{ github.sha }}" >> $env:GITHUB_ENV
          "BUILD_TIME=$((Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ"))" >> $env:GITHUB_ENV

      - name: Build Windows media runtime
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File build/deps/windows/build-media-runtime.ps1

      - name: Build Windows executable and installer
        shell: pwsh
        run: |
          wails3 task windows:build ARCH=amd64 APP_VERSION=${env:APP_VERSION} BUILD_COMMIT=${env:BUILD_COMMIT} BUILD_TIME=${env:BUILD_TIME}
          wails3 task windows:create:nsis:installer ARCH=amd64 APP_VERSION=${env:APP_VERSION} BUILD_COMMIT=${env:BUILD_COMMIT} BUILD_TIME=${env:BUILD_TIME}
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/ben-desktop.exe dist/ben-desktop-windows-amd64.exe
          if (Test-Path build/windows/nsis/ben-desktop-installer.exe) {
            Copy-Item build/windows/nsis/ben-desktop-installer.exe dist/ben-desktop-windows-amd64-setup.exe
          }
          go run ./cmd/benreleasetool runtime-bundle --source build/windows/runtime --version-file build/windows/runtime/version.txt --out-dir dist --require
          Copy-Item build/windows/runtime/licenses/media-runtime-source-record.json dist/ben-desktop-media-runtime-source-record-windows-amd64.json
          Copy-Item build/windows/runtime/licenses/ffmpeg-local-changes.diff dist/ben-desktop-ffmpeg-local-changes.diff
          Copy-Item build/windows/runtime/licenses/mpv-local-changes.diff dist/ben-desktop-mpv-local-changes.diff
          Copy-Item build/deps/.work/windows/ffmpeg-*.tar.xz dist/
          Copy-Item build/deps/.work/windows/mpv-v*.tar.gz dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*

  build-macos:
    name: macOS
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Set build metadata
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build universal app bundle
        run: |
          wails3 task darwin:package:universal APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv
          mkdir -p dist
          ditto -c -k --keepParent bin/ben-desktop.app dist/ben-desktop-darwin-universal.zip
          hdiutil create -volname "ben-desktop" -srcfolder bin/ben-desktop.app -ov -format UDZO dist/ben-desktop-darwin-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/*

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies and Wails CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"

      - name: Set build metadata
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build Linux binary and AppImage
        run: |
          wails3 task linux:build ARCH=amd64 APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv OUTPUT=bin/ben-desktop-linux-amd64
          mkdir -p dist
          cp bin/ben-desktop-linux-amd64 dist/ben-desktop-linux-amd64
          wails3 task linux:create:appimage ARCH=amd64 APP_VERSION="${APP_VERSION}" BUILD_COMMIT="${BUILD_COMMIT}" BUILD_TIME="${BUILD_TIME}" EXTRA_TAGS=nompv OUTPUT=bin/ben-desktop
          cp bin/*.AppImage dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      UPDATER_PRIVATE_KEY_PEM: ${{ secrets.UPDATER_PRIVATE_KEY_PEM }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Sign release assets
        run: |
          test -n "${UPDATER_PRIVATE_KEY_PEM}"
          mapfile -t ASSETS < <(find dist -maxdepth 1 -type f ! -name '*.sig' ! -name 'SHA256SUMS' -printf '%p\n' | sort)
          go run ./cmd/benreleasetool sign --sums dist/SHA256SUMS "${ASSETS[@]}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "ben-desktop ${RELEASE_TAG}" \
            --generate-notes
